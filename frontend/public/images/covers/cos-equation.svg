<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>

    <!-- Exposure path gradient - fades out -->
    <linearGradient id="fadeOut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="50%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#78716c" stop-opacity="0"/>
    </linearGradient>

    <!-- Evidence path gradient - intensifies -->
    <linearGradient id="buildUp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="40%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Evidence glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger ambient glow behind evidence path -->
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>

    <!-- Dot texture -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.4" fill="#44403c" opacity="0.3"/>
    </pattern>

    <!-- Fading dashes -->
    <linearGradient id="fadeDash" x1="0.2" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#57534e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#57534e" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial glow at origin -->
    <radialGradient id="originGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d6d3d1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d6d3d1" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow at evidence tip -->
    <radialGradient id="tipGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Ambient glow behind evidence path -->
  <path d="M 180 400 C 300 410, 380 440, 460 445 C 560 450, 620 430, 700 380 C 800 310, 880 220, 1000 120"
        stroke="#d97706" stroke-width="40" fill="none" filter="url(#ambientGlow)" opacity="0.15"/>

  <!-- Origin glow -->
  <circle cx="180" cy="400" r="60" fill="url(#originGlow)"/>

  <!-- Tip glow -->
  <circle cx="1020" cy="110" r="80" fill="url(#tipGlow)"/>

  <!-- Faint horizontal baseline -->
  <line x1="120" y1="400" x2="1080" y2="400" stroke="#44403c" stroke-width="0.5" opacity="0.2"/>

  <!-- ============ EXPOSURE PATH ============ -->
  <!-- Main line -->
  <path d="M 180 400 C 320 400, 380 365, 500 355 C 620 345, 740 355, 880 360"
        stroke="url(#fadeOut)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Dissolving particles -->
  <circle cx="900" cy="361" r="2.5" fill="#78716c" opacity="0.25"/>
  <circle cx="922" cy="363" r="2" fill="#78716c" opacity="0.18"/>
  <circle cx="942" cy="360" r="1.5" fill="#78716c" opacity="0.12"/>
  <circle cx="960" cy="363" r="1.2" fill="#78716c" opacity="0.07"/>
  <circle cx="976" cy="361" r="0.8" fill="#78716c" opacity="0.04"/>

  <!-- Fading dashes -->
  <path d="M 880 360 C 920 362, 960 364, 1010 365"
        stroke="url(#fadeDash)" stroke-width="1.5" stroke-dasharray="3 7" fill="none"/>

  <!-- Exposure label -->
  <text x="750" y="330" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="600" fill="#d6d3d1" opacity="0.7" letter-spacing="6" text-anchor="middle">
    EXPOSURE
  </text>

  <!-- ============ EVIDENCE PATH ============ -->
  <!-- Main line with glow -->
  <path d="M 180 400 C 280 405, 360 435, 460 445 C 560 455, 620 435, 700 380 C 780 325, 850 240, 940 170 C 980 145, 1000 125, 1030 105"
        stroke="url(#buildUp)" stroke-width="4" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Building blocks along evidence path — growing bolder -->
  <g opacity="0.45">
    <rect x="350" y="430" width="14" height="14" rx="2.5" fill="#92400e" transform="rotate(-3 357 437)"/>
  </g>
  <g opacity="0.55">
    <rect x="455" y="441" width="15" height="15" rx="2.5" fill="#b45309" transform="rotate(-5 462 448)"/>
  </g>
  <g opacity="0.7">
    <rect x="620" y="415" width="16" height="16" rx="3" fill="#d97706" transform="rotate(-18 628 423)"/>
  </g>
  <g opacity="0.8">
    <rect x="780" y="305" width="18" height="18" rx="3" fill="#f59e0b" transform="rotate(-32 789 314)"/>
  </g>
  <g opacity="0.95">
    <rect x="940" y="158" width="20" height="20" rx="3" fill="#fbbf24" transform="rotate(-42 950 168)"/>
  </g>

  <!-- Arrow tip — proper triangular arrowhead -->
  <polygon points="1050,88 1020,105 1030,118" fill="#fbbf24" filter="url(#glow)"/>

  <!-- Evidence label -->
  <text x="960" y="75" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="24" font-weight="700" fill="#fbbf24" opacity="1" letter-spacing="6" text-anchor="middle">
    EVIDENCE
  </text>

  <!-- ============ ORIGIN ============ -->
  <circle cx="180" cy="400" r="7" fill="#d6d3d1"/>
  <circle cx="180" cy="400" r="14" fill="none" stroke="#d6d3d1" stroke-width="1" opacity="0.3"/>
  <circle cx="180" cy="400" r="22" fill="none" stroke="#d6d3d1" stroke-width="0.5" opacity="0.12"/>

  <!-- Origin label -->
  <text x="180" y="448" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="16" font-weight="600" fill="#d6d3d1" opacity="0.85" text-anchor="middle" letter-spacing="4">
    CoS SEAT
  </text>

  <!-- ============ PHASE MARKERS ============ -->
  <line x1="480" y1="330" x2="480" y2="480" stroke="#78716c" stroke-width="0.7" stroke-dasharray="3 6" opacity="0.5"/>
  <text x="480" y="502" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="600" fill="#a8a29e" opacity="0.75" text-anchor="middle" letter-spacing="4">
    PHASE 1
  </text>

  <line x1="720" y1="310" x2="720" y2="480" stroke="#78716c" stroke-width="0.7" stroke-dasharray="3 6" opacity="0.5"/>
  <text x="720" y="502" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="600" fill="#a8a29e" opacity="0.75" text-anchor="middle" letter-spacing="4">
    PHASE 2
  </text>
</svg>
